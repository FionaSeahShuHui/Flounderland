    />

      href="https://cdnjs.cloudflare.com/ajax/libs/ionicons/2.0.1/css/ionicons.min.css"
    />

  <body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container-fluid">
        <a href="index.html" class="navbar-brand" style="font-size: 30px">
          Flounderland

          class="navbar-toggler"
          data-bs-toggle="collapse"
          data-bs-target="#navbarCollapse"

        </button>
        <div class="collapse navbar-collapse" id="navbarCollapse">
          <div class="navbar-nav">
            <a href="index.html" class="nav-item nav-link" style="font-size: 20px"
              >Home</a

            <a href="#" class="nav-item nav-link" style="font-size: 20px"

            <a href="#" class="nav-item nav-link" style="font-size: 20px"

              >Contact Me</a
            >
          </div>
        </div>
      </div>
    </nav>
    <!-- Main Content  -->
    <div class="ContactMe" style="margin-top: 20px">
      <div class="row" style="margin: 20px">
        <div
          class="container"
          style="
            box-shadow: 0 4px 8px 0 rgba(0, 0, 0, 0.2),
              0 6px 20px 0 rgba(0, 0, 0, 0.19);
          "
        >
          <!-- Title  -->
          <h1 style="margin-top: 20px; text-align: center;margin-bottom: 30px;">Contact Me</h1>
          <!-- Divider  -->
          <hr class="solid">
          <!-- Form  -->
          <form style="margin: 30px">
              <!-- First Name & Last Name  -->
              <div class="row">
                <div class="col-lg-6">
                  <label for="firstName" style="margin-bottom: 10px;"><h5>First Name *</h5></label>
                  <input id="firstName" required autofocus name="firstName" type="text" placeholder="First Name" style="height: 50px; width: 100%; margin-bottom: 20px;">
                </div>
                <div class="col-lg-6">
                  <label for="lastName" style="margin-bottom: 10px;"><h5>Last Name</h5></label>
                  <input id="lastName" name="lastName" type="text" placeholder="Last Name" style="height: 50px; width: 100%; margin-bottom: 20px;">
                </div>
              </div>
              <!-- Email  -->
              <div>
                <label for="emailAddress" style="margin-bottom: 10px;"><h5>Email *</h5></label>
                <input id="emailAddress" required name="emailAddress" type="email" placeholder="Email Address" style="height: 50px; width: 100%; margin-bottom: 20px;">
              </div>
              <!-- Message  -->
              <div>
                <label for="message" style="margin-bottom: 10px;"><h5>Message *</h5></label>
                <textarea rows="5" cols="60" required name="text" placeholder="Message" style="width: 100%; height: 120px; margin-bottom: 10px;"></textarea>
              </div>
              <!-- Submit Button  -->
              <div class="submitButton" style="margin-top: 20px;">
                <input type="submit" value="Submit" style="height: 50px; width: 100%; background-color: black; color: white;">
              </div>
              
            </div>
          </form>
        </div>
      </div>
    </div>
    <!-- Footer  -->
    <div class="footer-basic">
      <footer>
        <div class="social">
          <a href="https://www.facebook.com/fiona.seah.94">

          </a>

          </a>
          <a href="https://github.com/FionaSeahShuHui?tab=repositories">
            <i class="icon ion-social-github-outline"></i>
          </a>
          <a href="https://twitter.com/XiaoTingHere">
            <i class="icon ion-social-twitter"></i>
          </a>
        </div>
        <ul class="list-inline">
          <li class="list-inline-item"><a href="index.html">Home</a></li>
          <li class="list-inline-item"><a href="#">About Me</a></li>
          <li class="list-inline-item"><a href="#">Gallery</a></li>
          <li class="list-inline-item"><a href="#">Projects</a></li>
          <li class="list-inline-item"><a href="ContactMe.html">Contact Me</a></li>
        </ul>
      </footer>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.2.1/jquery.min.js"></script>
